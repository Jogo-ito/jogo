<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white; 
            overscroll-behavior: none; 
            overflow-x: hidden;
        }

        /* Efeito de Vidro Premium */
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05); 
        }

        /* Animações de Carta */
        .card-perspective { perspective: 1000px; }
        .card-inner { transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; cursor: pointer; }
        .revealed .card-inner { transform: rotateY(180deg); }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 2.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .card-back { transform: rotateY(180deg); background: white; color: #0f172a; border: 12px solid; } 
        
        /* Feedback de entrada de jogadores */
        .player-entry { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Esconder Views */
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-slate-200">

    <div id="app" class="max-w-md mx-auto p-6 pb-24 min-h-screen flex flex-col justify-center">
        
        <div id="view-login" class="space-y-8 py-10 w-full">
            <header class="text-center animate-slideIn">
                <h1 class="text-7xl font-black italic tracking-tighter text-indigo-500 mb-2 drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]">ITO</h1>
            </header>

            <div class="space-y-4 animate-slideIn" style="animation-delay: 0.1s;">
                <div class="relative">
                    <input id="input-nome" type="text" maxlength="15" placeholder="Seu apelido..." 
                        class="w-full glass rounded-3xl p-5 text-xl font-bold text-center focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all shadow-inner">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="criarSala()" class="bg-indigo-600 hover:bg-indigo-500 active:scale-95 p-5 rounded-3xl font-extrabold transition-all shadow-lg shadow-indigo-900/40 uppercase tracking-tight text-sm">
                        Criar Sala
                    </button>
                    <button onclick="toggleEntrar()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 active:scale-95 p-5 rounded-3xl font-extrabold transition-all uppercase tracking-tight text-sm">
                        Entrar
                    </button>
                </div>
            </div>
            
            <div id="panel-entrar" class="hidden space-y-4 animate-slideIn">
                <input id="input-sala-id" type="text" placeholder="CÓDIGO DA SALA" 
                    class="w-full glass rounded-3xl p-5 text-center text-3xl font-mono font-black uppercase focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all text-emerald-400 placeholder:text-slate-600">
                <button onclick="entrarSala()" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 p-5 rounded-3xl font-black transition-all uppercase shadow-lg shadow-emerald-900/20 text-sm tracking-widest">
                    Conectar agora
                </button>
            </div>
        </div>

        <div id="view-game" class="hidden space-y-6 w-full pt-4">
            
            <header class="flex justify-between items-center glass p-4 rounded-[2rem]">
                <div class="flex items-center gap-3">
                    <div id="my-color-indicator" class="w-4 h-4 rounded-full shadow-[0_0_15px_currentColor]"></div>
                    <div>
                        <p class="text-[10px] font-black text-slate-500 tracking-widest uppercase leading-none">Sala Ativa</p>
                        <p id="display-sala-id" class="text-lg font-mono font-bold text-indigo-400 mt-1 leading-none">-</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="location.reload()" class="bg-slate-800/80 hover:bg-red-500/20 hover:text-red-400 p-3 rounded-2xl transition-all">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <section class="bg-indigo-600 p-6 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="thermometer" class="w-4 h-4 text-indigo-200"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-indigo-100 bg-indigo-900/30 px-2 py-1 rounded-full">Tema Atual</span>
                    </div>
                    <input id="input-tema" maxlength="60" placeholder="Digite o desafio aqui..." 
                        class="bg-transparent text-2xl font-black w-full outline-none placeholder:text-indigo-400/50 border-b-2 border-indigo-400/20 pb-2 focus:border-white transition-all">
                </div>
                <i data-lucide="flame" class="absolute -right-6 -bottom-6 w-32 h-32 text-white/10 transform rotate-12"></i>
            </section>

            <div id="area-carta" class="card-perspective h-80 w-full" onclick="revelarLocal()">
                <div id="carta-inner" class="card-inner relative w-full h-full">
                    <div class="card-face bg-gradient-to-br from-slate-800 to-slate-900 border-4 border-slate-700">
                        <div class="w-20 h-20 bg-slate-950/50 rounded-full flex items-center justify-center mb-4 border border-slate-700/50">
                            <i data-lucide="hand" class="w-10 h-10 text-indigo-500 animate-pulse"></i>
                        </div>
                        <p class="text-slate-500 font-black text-xs tracking-[0.4em] uppercase">Tocar para ver</p>
                    </div>
                    <div id="carta-frente" class="card-face card-back">
                        <div class="absolute top-8 left-10 font-black italic opacity-10 text-2xl tracking-tighter">ITO</div>
                        <h2 id="display-numero" class="text-[9rem] leading-none font-black tracking-tighter">0</h2>
                        <div class="absolute bottom-8 right-10 font-black italic opacity-10 text-2xl tracking-tighter">ITO</div>
                    </div>
                </div>
            </div>

            <div id="container-pista" class="hidden space-y-3 animate-slideIn">
                <div class="flex justify-center items-center gap-2 text-slate-500">
                    <i data-lucide="pen-tool" class="w-3 h-3"></i>
                    <p class="text-[10px] font-black uppercase tracking-[0.2em]">Sua Pista para o Grupo</p>
                </div>
                <div class="glass p-2 rounded-[2rem]">
                    <input id="input-pista" type="text" maxlength="35" placeholder="Ex: Um café recém passado..." 
                        class="w-full bg-slate-900/50 p-4 rounded-3xl text-center text-xl font-bold text-emerald-400 outline-none placeholder:text-slate-600 focus:bg-slate-900 transition-all">
                </div>
            </div>

            <footer class="grid grid-cols-2 gap-4">
                <button onclick="sortear()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 p-5 rounded-[1.5rem] font-black text-xs uppercase tracking-widest active:scale-95 transition-transform shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="shuffle" class="w-4 h-4 text-indigo-400"></i> Novo Round
                </button>
                <button onclick="revelarGeral()" class="bg-emerald-600 hover:bg-emerald-500 p-5 rounded-[1.5rem] font-black text-xs uppercase tracking-widest text-white shadow-lg shadow-emerald-900/40 active:scale-95 transition-transform flex items-center justify-center gap-2">
                    <i data-lucide="eye" class="w-4 h-4"></i> Revelar Tudo
                </button>
            </footer>

            <div class="space-y-4 pt-4 border-t border-slate-800">
                <div class="flex justify-between items-center px-2">
                    <div class="flex items-center gap-2">
                        <i data-lucide="users" class="w-4 h-4 text-slate-500"></i>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Mesa de Jogo</p>
                    </div>
                    <span id="player-count" class="text-[10px] font-bold bg-slate-800 text-slate-400 px-3 py-1 rounded-full">-</span>
                </div>
                <div id="lista-jogadores" class="space-y-2">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // --- ⚙️ CONFIGURAÇÕES SUPABASE ---
        const db = window.supabase.createClient(
            "https://zatuzblawpfumwxzkfpu.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphdHV6Ymxhd3BmdW13eHprZnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NDE4NzEsImV4cCI6MjA4ODUxNzg3MX0.jKkfclscnkGk2SocjfCI9q5QVGBpSjxEzR07PXhdeHo"
        );

        // Paleta Vibrante de Identidade
        const COLORS = ['#10b981', '#f43f5e', '#f59e0b', '#8b5cf6', '#0ea5e9', '#d946ef', '#14b8a6', '#f97316'];

        let salaId = null;
        let userId = localStorage.getItem('ito_user_id') || crypto.randomUUID();
        let minhaCor = localStorage.getItem('ito_user_color') || COLORS[Math.floor(Math.random() * COLORS.length)];
        
        localStorage.setItem('ito_user_id', userId);
        localStorage.setItem('ito_user_color', minhaCor);

        // Sanitização Anti-XSS
        function clean(str) {
            if (!str) return "";
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML.replace(/[<>]/g, "").trim();
        }

        function toggleEntrar() { 
            document.getElementById('panel-entrar').classList.toggle('hidden'); 
        }

        // --- CORREÇÃO DA GERAÇÃO DA SALA AQUI ---
        async function criarSala() {
            // Gera um código de 4 caracteres para não dar erro de ID nulo
            const codigoSala = Math.random().toString(36).substring(2, 6).toUpperCase();

            const { data, error } = await db.from('salas').insert([{ 
                id: codigoSala,
                status: 'lobby' 
            }]).select();
            
            if (error) {
                console.error("Erro ao criar sala:", error);
                alert("Falha ao conectar no Supabase. Erro: " + error.message);
                return;
            }

            if (data && data.length > 0) {
                salaId = data[0].id;
                await participar();
            }
        }

        async function entrarSala() {
            salaId = document.getElementById('input-sala-id').value.trim().toUpperCase();
            if (salaId) await participar();
        }

        async function participar() {
            const nomeRaw = document.getElementById('input-nome').value || "Misterioso";
            const nomeSanitizado = clean(nomeRaw);
            
            const { error } = await db.from('jogadores').upsert([{ 
                id: userId, 
                sala_id: salaId, 
                nome: nomeSanitizado,
                cor_hex: minhaCor 
            }]);

            if (error) {
                console.error("Erro ao entrar na sala:", error);
                alert("Falha ao registrar jogador. Erro: " + error.message);
                return;
            }
            
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-game').classList.remove('hidden');
            document.getElementById('display-sala-id').innerText = salaId;
            
            // Configura a cor do player na UI
            document.getElementById('my-color-indicator').style.backgroundColor = minhaCor;
            document.getElementById('my-color-indicator').style.color = minhaCor;
            document.getElementById('carta-frente').style.borderColor = minhaCor;
            
            lucide.createIcons();
            initRealtime();
        }

        function initRealtime() {
            db.channel('ito_room_' + salaId)
                .on('postgres_changes', { event: '*', schema: 'public' }, () => atualizarInterface())
                .subscribe();
            atualizarInterface();
        }

        async function atualizarInterface() {
            const { data: sala, error: erroSala } = await db.from('salas').select('*').eq('id', salaId).single();
            const { data: jogadores } = await db.from('jogadores').select('*').eq('sala_id', salaId);
            
            if (erroSala || !sala || !jogadores) return;

            // TEMA
            const inputTema = document.getElementById('input-tema');
            if (document.activeElement !== inputTema) inputTema.value = sala.tema || "";
            inputTema.onchange = async () => {
                await db.from('salas').update({ tema: clean(inputTema.value) }).eq('id', salaId);
            };

            // JOGADORES (MESA DIGITAL)
            document.getElementById('player-count').innerText = `${jogadores.length} Players`;
            const lista = document.getElementById('lista-jogadores');
            
            lista.innerHTML = jogadores.map(j => {
                const isMe = j.id === userId;
                const hasPista = !!j.pista;
                const pistaHtml = hasPista 
                    ? `<p class="text-xs font-bold text-emerald-400 italic mt-1">“${j.pista}”</p>`
                    : `<p class="text-[10px] font-black text-slate-600 uppercase tracking-widest mt-1">Pensando...</p>`;
                
                const iconHtml = hasPista
                    ? `<i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500/50"></i>`
                    : `<div class="w-4 h-4 rounded-full border-2 border-slate-700 border-t-indigo-500 animate-spin"></div>`;

                const revealHtml = (j.numero && sala.status === 'revelado') 
                    ? `<div class="bg-white text-slate-900 min-w-[2.5rem] h-10 px-2 rounded-xl flex items-center justify-center font-black text-xl shadow-lg border-4" style="border-color: ${j.cor_hex}">${j.numero}</div>` 
                    : iconHtml;

                return `
                <div class="player-entry glass p-4 rounded-3xl flex items-center justify-between shadow-sm mt-2">
                    <div class="flex items-center gap-4">
                        <div class="w-2 h-10 rounded-full" style="background-color: ${j.cor_hex}"></div>
                        <div>
                            <p class="text-sm font-black ${isMe ? 'text-indigo-400' : 'text-slate-200'}">
                                ${j.nome} ${isMe ? '<span class="text-[10px] opacity-50 ml-1">(VOCÊ)</span>' : ''}
                            </p>
                            ${pistaHtml}
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        ${revealHtml}
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();

            // LÓGICA LOCAL (Sua Carta e Sua Pista)
            const eu = jogadores.find(j => j.id === userId);
            const containerPista = document.getElementById('container-pista');
            const inputPista = document.getElementById('input-pista');
            const areaCarta = document.getElementById('area-carta');
            
            if (eu?.numero && sala.status === 'jogando') {
                document.getElementById('display-numero').innerText = eu.numero;
                containerPista.classList.remove('hidden');
                
                if (document.activeElement !== inputPista) inputPista.value = eu.pista || "";
                inputPista.onchange = async () => {
                    await db.from('jogadores').update({ pista: clean(inputPista.value) }).eq('id', userId);
                };
            } else {
                containerPista.classList.add('hidden');
                if (sala.status !== 'revelado') {
                    areaCarta.classList.remove('revealed');
                }
            }

            if (sala.status === 'revelado') {
                areaCarta.classList.add('revealed');
            }
        }

        async function sortear() {
            await db.from('salas').update({ status: 'sorteando', tema: '' }).eq('id', salaId);
            const { data: jogadores } = await db.from('jogadores').select('id').eq('sala_id', salaId);
            
            for (const j of jogadores) {
                await db.from('jogadores').update({ numero: null, pista: null }).eq('id', j.id);
            }

            let nums = Array.from({length: 100}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            for (let i = 0; i < jogadores.length; i++) {
                await db.from('jogadores').update({ numero: nums[i] }).eq('id', jogadores[i].id);
            }
            await db.from('salas').update({ status: 'jogando' }).eq('id', salaId);
        }

        function revelarLocal() { 
            document.getElementById('area-carta').classList.toggle('revealed'); 
        }
        
        async function revelarGeral() { 
            await db.from('salas').update({ status: 'revelado' }).eq('id', salaId); 
        }
    </script>
</body>
</html>
