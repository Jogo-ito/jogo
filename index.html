<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ITO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&display=swap');

        /* VARIÁVEIS DE TEMA (Claro/Escuro) */
        :root {
            --bg-color: #F7F7F2;
            --text-color: #1A1A1A;
            --muted-text: #888888;
            --accent-color: #DDA74A; /* Amarelo da linha */
            --border-color: #E0E0E0;
            --btn-bg: #1A1A1A;
            --btn-text: #FFFFFF;
        }

        body.dark-theme {
            --bg-color: #0A0A0A;
            --text-color: #FFFFFF;
            --muted-text: #666666;
            --accent-color: #FF0055; /* Rosa Neon */
            --border-color: #333333;
            --btn-bg: #FFFFFF;
            --btn-text: #0A0A0A;
        }

        /* RESET E BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; min-height: 100%; font-family: 'Jost', sans-serif; 
            background-color: var(--bg-color); color: var(--text-color);
            transition: background-color 0.4s, color 0.4s; overflow-x: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* HEADER E TEMAS */
        .top-bar { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .theme-toggle { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-color); }

        h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: 8px; margin-top: 50px; margin-bottom: 30px; text-align: center; }

        /* INPUTS E BOTÕES MINIMALISTAS */
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; width: 100%; max-width: 400px; margin: 0 auto; min-height: 80vh; }
        
        input { 
            width: 100%; padding: 18px; font-size: 1.2rem; text-align: center; letter-spacing: 2px;
            background: transparent; border: 2px solid var(--border-color); color: var(--text-color);
            border-radius: 12px; margin-bottom: 15px; font-family: inherit; font-weight: 600; text-transform: uppercase;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-color); }

        button { 
            width: 100%; padding: 18px; font-size: 1rem; font-weight: 700; letter-spacing: 1px;
            background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 12px;
            cursor: pointer; transition: transform 0.2s, background 0.3s; font-family: inherit; margin-bottom: 10px;
        }
        button:active { transform: scale(0.97); }
        .btn-revelar { background: var(--accent-color); color: #fff; }
        
        /* SEPARADOR */
        .divider { display: flex; align-items: center; width: 100%; margin: 20px 0; color: var(--muted-text); font-weight: 600; font-size: 0.9rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); margin: 0 15px; }

        /* ÁREA DE JOGO E LOBBY */
        .sala-header { font-size: 1.2rem; font-weight: 700; letter-spacing: 4px; margin-bottom: 20px; opacity: 0.5; }
        #qrcode { background: white; padding: 15px; display: inline-block; border-radius: 12px; margin-bottom: 15px; }
        .btn-copy { background: transparent; color: var(--text-color); border: 2px solid var(--border-color); padding: 10px; font-size: 0.8rem; }
        
        .lista-jogadores { list-style: none; width: 100%; text-align: left; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .jogador-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 1.1rem; }
        .btn-kick { background: #ff4444; color: white; padding: 5px 10px; width: auto; font-size: 0.7rem; border-radius: 6px; margin: 0; }

        /* A GRANDE CARTA INTERATIVA */
        #card-principal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; z-index: 50; background: var(--bg-color);
        }

        .numero-secreto { font-size: 35vh; font-weight: 700; display: none; line-height: 1; z-index: 10; color: var(--text-color); }
        .interrogacao { font-size: 15vh; font-weight: 400; opacity: 0.2; transition: 0.2s; z-index: 10; }
        .instrucao { position: absolute; bottom: 50px; font-size: 0.9rem; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

        /* ELEMENTOS DECORATIVOS DOS TEMAS */
        .linha-decorativa { display: none; }
        .neon-circle { display: none; }

            position: absolute; bottom: 120px; width: 100%; height: 2px; background: var(--accent-color);
