<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ITO</title>
    
    <link rel="icon" href="/icons/icon-light.png" type="image/png" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" href="/icons/icon-light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/icons/icon-dark.png" type="image/png" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="/icons/icon-dark.png" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F7F7F2" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700;900&display=swap');

        /* VARIÁVEIS DE TEMA */
        :root {
            --bg-color: #F7F7F2;
            --text-color: #1A1A1A;
            --muted-text: #888888;
            --accent-color: #DDA74A; 
            --border-color: #E0E0E0;
            --btn-bg: #1A1A1A;
            --btn-text: #FFFFFF;
        }

        body.dark-theme {
            --bg-color: #0A0A0A;
            --text-color: #FFFFFF;
            --muted-text: #666666;
            --accent-color: #FF0055; 
            --border-color: #333333;
            --btn-bg: #FFFFFF;
            --btn-text: #0A0A0A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; min-height: 100vh; font-family: 'Jost', sans-serif; 
            background-color: var(--bg-color); color: var(--text-color);
            transition: background-color 0.4s, color 0.4s; overflow-x: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* HEADER E TEMAS */
        .top-bar { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .theme-toggle { 
            background: transparent; border: none; cursor: pointer; 
            color: var(--text-color); display: flex; align-items: center; justify-content: center;
            padding: 5px; opacity: 0.7; transition: 0.3s;
        }
        .theme-toggle:hover { opacity: 1; }
        .theme-toggle svg { width: 24px; height: 24px; stroke-width: 2; }

        h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: 8px; margin-top: 50px; margin-bottom: 30px; text-align: center; }

        /* INPUTS E BOTÕES */
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; width: 100%; max-width: 400px; margin: 0 auto; min-height: 80vh; }
        
        input { 
            width: 100%; padding: 18px; font-size: 1.1rem; text-align: center; letter-spacing: 2px;
            background: transparent; border: 2px solid var(--border-color); color: var(--text-color);
            border-radius: 12px; margin-bottom: 15px; font-family: inherit; font-weight: 600; text-transform: uppercase;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-color); }

        /* Feature 8: Input do Lobby */
        .input-lobby-name {
            border: 1px dashed var(--border-color); padding: 12px; font-size: 1rem;
            margin-bottom: 20px; border-radius: 8px; font-weight: 700;
        }

        button { 
            width: 100%; padding: 18px; font-size: 1rem; font-weight: 700; letter-spacing: 1px;
            background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 12px;
            cursor: pointer; transition: transform 0.2s, background 0.3s; font-family: inherit; margin-bottom: 10px;
        }
        button:active { transform: scale(0.97); }
        .btn-revelar { background: var(--accent-color); color: #fff; }
        
        .divider { display: flex; align-items: center; width: 100%; margin: 20px 0; color: var(--muted-text); font-weight: 600; font-size: 0.9rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); margin: 0 15px; }

        /* ÁREA DE JOGO E LOBBY */
        .sala-header { font-size: 1.2rem; font-weight: 700; letter-spacing: 4px; margin-bottom: 20px; opacity: 0.5; }
        #qrcode { background: white; padding: 15px; display: inline-block; border-radius: 12px; margin-bottom: 15px; }
        .btn-copy { background: transparent; color: var(--text-color); border: 2px solid var(--border-color); padding: 10px; font-size: 0.8rem; }
        
        .lista-jogadores { list-style: none; width: 100%; text-align: left; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .jogador-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 1.1rem; }
        .btn-kick { background: #ff4444; color: white; padding: 5px 10px; width: auto; font-size: 0.7rem; border-radius: 6px; margin: 0; }

        /* A GRANDE CARTA INTERATIVA (Feature 4: Ergonomia 28vh e -12vh) */
        #card-principal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; z-index: 50; background: var(--bg-color);
        }

        .numero-secreto { font-size: 28vh; font-weight: 900; display: none; line-height: 1; z-index: 10; color: var(--text-color); transform: translateY(-12vh); }
        .interrogacao { font-size: 15vh; font-weight: 400; opacity: 0.2; transition: 0.2s; z-index: 10; transform: translateY(-12vh); }
        .instrucao { position: absolute; bottom: 120px; font-size: 0.9rem; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

        .linha-decorativa { display: none; }
        .neon-circle { display: none; }

        body:not(.dark-theme) .linha-decorativa {
            position: absolute; bottom: 120px; width: 100%; height: 2px; background: var(--accent-color);
            display: block; transition: transform 0.3s, opacity 0.3s;
        }
        body:not(.dark-theme) .linha-decorativa::after {
            content: ''; position: absolute; left: 50%; top: -14px; width: 28px; height: 28px;
            border: 2px solid var(--accent-color); border-radius: 8px; background: var(--bg-color); transform: translateX(-50%);
        }
        body:not(.dark-theme) #card-principal.active .linha-decorativa { transform: scaleY(2); opacity: 0.5; }

        body.dark-theme .neon-circle {
            position: absolute; width: 65vw; height: 65vw; max-width: 350px; max-height: 350px;
            border: 4px solid var(--accent-color); border-radius: 50%; opacity: 0.05; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; pointer-events: none; transform: translateY(-12vh);
        }
        body.dark-theme #card-principal.active .neon-circle { opacity: 1; box-shadow: 0 0 50px rgba(255,0,85,0.3); transform: translateY(-12vh) scale(1.05); }
        body.dark-theme #card-principal.active .numero-secreto { text-shadow: 0 0 20px rgba(255,255,255,0.4); }

        .host-overlay { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 100; display: none; }
        .sala-header-overlay { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 100; font-size: 1rem; font-weight: 700; letter-spacing: 3px; opacity: 0.5; display: none; }

        /* FEATURE 7 e 9: ESTILOS DO MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 2000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            width: 85%; max-width: 350px; padding: 30px; border-radius: 20px;
            background: var(--bg-color); color: var(--text-color);
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid var(--border-color);
        }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn-confirm { flex: 2; padding: 15px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; background: #d9534f; color: white; margin-bottom: 0;}
        .btn-cancel { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); background: transparent; color: var(--text-color); font-weight: 600; font-size: 12px; cursor: pointer; margin-bottom: 0;}

    </style>
</head>
<body>

    <div class="top-bar">
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">
            <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="display: block;">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </div>

    <div id="setup-section" class="container">
        <h1>ITO</h1>
        
        <input type="text" id="input-nome" placeholder="SEU NOME" autocomplete="off" maxlength="15" style="border-color: transparent; border-bottom-color: var(--border-color); border-radius: 0; margin-bottom: 30px;">
        
        <button onclick="criarSala()">CRIAR NOVA SALA</button>
        <div class="divider">OU</div>
        <input type="text" id="input-sala" placeholder="CÓDIGO DA SALA" autocomplete="off" maxlength="4">
        <button onclick="entrarSala()" style="background: transparent; border: 2px solid var(--border-color); color: var(--text-color);">ENTRAR NA SALA</button>
    </div>

    <div id="lobby-area" class="container" style="display:none;">
        <div class="sala-header">SALA: <strong id="display-id-sala"></strong></div>
        
        <input type="text" id="lobby-nome-input" class="input-lobby-name" placeholder="EDITAR SEU NOME" maxlength="15" onchange="atualizarNomeLobby(this.value)">

        <div id="qrcode-container" style="display:none; text-align: center;">
            <div id="qrcode"></div>
            <button class="btn-copy" onclick="copiarLink()">COPIAR LINK DA SALA</button>
        </div>

        <ul class="lista-jogadores" id="lista-jogadores"></ul>
        
        <div id="lobby-host-controls" style="width: 100%; margin-top: 20px; display: none;">
            <button id="btn-sortear" onclick="sortearNumeros()">SORTEAR E COMEÇAR</button>
        </div>
        <p id="wait-message-lobby" style="margin-top:20px; color: var(--accent-color); font-weight: 600;">Aguardando Host...</p>

        <button onclick="confirmExit('home')" style="background:transparent; border:none; color:var(--muted-text); margin-top:30px; text-decoration:underline; font-size:0.9rem;">Sair do Grupo</button>
    </div>

    <div id="game-section" style="display:none;">
        
        <button onclick="confirmExit('lobby')" style="position: absolute; top: 30px; left: 20px; z-index: 1000; background:transparent; border:none; color:var(--text-color); font-weight:700; opacity: 0.5; font-size: 14px;">← SAIR</button>

        <div class="sala-header-overlay" id="sala-header-jogo">SALA: <strong>ABCD</strong></div>
        
        <div id="card-principal"
             onmousedown="interactStart(event)" onmouseup="interactEnd(event)" onmouseleave="interactEnd(event)"
             ontouchstart="interactStart(event)" ontouchend="interactEnd(event)">
            
            <div class="linha-decorativa"></div>
            <div class="neon-circle"></div>

            <div class="interrogacao" id="interrogacao">?</div>
            <div class="numero-secreto" id="meu-numero"></div>

            <div class="instrucao" id="instrucao-texto" style="bottom: 120px;">Segure para revelar</div>
        </div>

        <div class="host-overlay" id="host-controls">
            <button class="btn-revelar" id="btn-revelar" style="display:none;" onclick="revelarTodos()">REVELAR TUDO</button>
            <button class="btn-reset" id="btn-reset" style="display:none; background: var(--text-color); color: var(--bg-color);" onclick="voltarLobby()">PRÓXIMA RODADA (LOBBY)</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Atenção</h3>
            <p id="modal-msg" style="margin: 15px 0; opacity: 0.8; font-weight: 600;"></p>
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeModal()">CANCELAR</button>
                <button id="modal-confirm-btn" class="btn-confirm">SAIR</button>
            </div>
        </div>
    </div>

    <script>
        // --- GERENCIAMENTO DE TEMA ---
        function toggleTheme() {
            const body = document.body;
            const iconMoon = document.getElementById('icon-moon');
            const iconSun = document.getElementById('icon-sun');
            
            if (body.classList.contains('dark-theme')) {
                body.classList.remove('dark-theme');
                localStorage.setItem('ito_theme', 'light');
                iconMoon.style.display = 'block';
                iconSun.style.display = 'none';
            } else {
                body.classList.add('dark-theme');
                localStorage.setItem('ito_theme', 'dark');
                iconMoon.style.display = 'none';
                iconSun.style.display = 'block';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('ito_theme');
            const iconMoon = document.getElementById('icon-moon');
            const iconSun = document.getElementById('icon-sun');
            
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark-theme');
                iconMoon.style.display = 'none';
                iconSun.style.display = 'block';
            }

            const savedName = localStorage.getItem('ito_player_name');
            if (savedName) {
                document.getElementById('input-nome').value = savedName;
            }
        });

        // --- LÓGICA DE NOME ---
        function getPlayerName() {
            let inputVal = document.getElementById('input-nome').value.trim();
            if (!inputVal) {
                inputVal = "Jogador " + Math.floor(Math.random() * 1000);
            }
            localStorage.setItem('ito_player_name', inputVal);
            return inputVal.toUpperCase();
        }

        // Feature 8: Atualizar nome dentro do Lobby via Supabase
        async function atualizarNomeLobby(novoNome) {
            let val = novoNome.trim().toUpperCase();
            if(!val) return;
            localStorage.setItem('ito_player_name', val);
            
            const { data } = await sbClient.from('salas').select('*').eq('id_sala', salaAtual).single();
            if (!data) return;
            let lista = data.jogadores;
            let indexJogador = lista.findIndex(j => j.id === meuID);
            if (indexJogador !== -1) {
                lista[indexJogador].nome = val;
                await sbClient.from('salas').update({ jogadores: lista }).eq('id_sala', salaAtual);
            }
        }

        // --- LÓGICA DE MODAIS (Saída) ---
        function confirmExit(target) {
            const modal = document.getElementById('confirm-modal');
            const msg = document.getElementById('modal-msg');
            const btn = document.getElementById('modal-confirm-btn');
            
            modal.style.display = 'flex';
            
            if(target === 'home') {
                msg.innerText = souHost ? "Você é o host. Sair agora pode desfazer o grupo. Deseja retornar ao menu inicial?" : "Você sairá deste grupo. Deseja confirmar?";
                btn.onclick = () => window.location.href = window.location.origin + window.location.pathname;
            } else if (target === 'lobby') {
                msg.innerText = "A partida está em andamento. Deseja mesmo abandonar e voltar ao menu?";
                btn.onclick = () => window.location.href = window.location.origin + window.location.pathname;
            }
        }

        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }


        // --- CONFIGURAÇÃO SUPABASE ---
        const SUPABASE_URL = 'https://zatuzblawpfumwxzkfpu.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_FmblL1EuUfu79E-wE3eJOw_BJxgMd_K';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let salaAtual = "";
        let meuID = localStorage.getItem('ito_player_id') || Math.random().toString(36).substring(7);
        localStorage.setItem('ito_player_id', meuID);
        let souHost = false;
        let globalStatus = 'esperando';

        function interactStart(e) {
            if(e && e.type !== 'mousedown') e.preventDefault(); 
            if(globalStatus === 'revelado') return; 
            if (navigator.vibrate) navigator.vibrate(50); 
            document.getElementById('interrogacao').style.display = 'none';
            document.getElementById('meu-numero').style.display = 'block';
            document.getElementById('card-principal').classList.add('active');
        }

        function interactEnd(e) {
            if(e && e.type !== 'mouseup' && e.type !== 'mouseleave') e.preventDefault();
            if(globalStatus === 'revelado') return; 
            document.getElementById('interrogacao').style.display = 'block';
            document.getElementById('meu-numero').style.display = 'none';
            document.getElementById('card-principal').classList.remove('active');
        }

        async function criarSala() {
            try {
                const id = Math.random().toString(36).substring(4, 8).toUpperCase();
                const nomeJogador = getPlayerName();
                
                const { error } = await sbClient.from('salas').insert([{ 
                    id_sala: id, status: 'esperando', jogadores: [{id: meuID, nome: nomeJogador, numero: null}] 
                }]);
                if(error) throw error;
                
                localStorage.setItem(`host_${id}`, 'true'); 
                abrirSala(id, true);
                
                const urlSala = window.location.origin + window.location.pathname + "?sala=" + id;
                document.getElementById("qrcode").innerHTML = ""; 
                new QRCode(document.getElementById("qrcode"), { text: urlSala, width: 140, height: 140, colorDark: "#000000", colorLight: "#ffffff" });
                document.getElementById('qrcode-container').style.display = 'block';
            } catch (err) { alert("Erro ao criar sala. Verifique a conexão."); }
        }

        async function entrarSala() {
            try {
                const id = document.getElementById('input-sala').value.toUpperCase() || new URLSearchParams(window.location.search).get('sala');
                if(!id) return;
                
                const nomeJogador = getPlayerName();
                const { data, error } = await sbClient.from('salas').select('*').eq('id_sala', id).single();
                if (error || !data) throw new Error("Sala não encontrada!");
                
                let lista = data.jogadores || [];
                let indexJogador = lista.findIndex(j => j.id === meuID);
                if (indexJogador === -1) {
                    lista.push({ id: meuID, nome: nomeJogador, numero: null });
                } else {
                    lista[indexJogador].nome = nomeJogador;
                }
                
                await sbClient.from('salas').update({ jogadores: lista }).eq('id_sala', id);
                
                const isHost = localStorage.getItem(`host_${id}`) === 'true';
                abrirSala(id, isHost);
            } catch (err) { alert(err.message); }
        }

        function abrirSala(id, isHost) {
            salaAtual = id; souHost = isHost;
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('display-id-sala').innerText = id;
            document.getElementById('sala-header-jogo').innerHTML = `SALA: <strong>${id}</strong>`;
            
            // Preenche o input do lobby com o nome salvo
            document.getElementById('lobby-nome-input').value = localStorage.getItem('ito_player_name') || "";
            
            inscreverNoJogo();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function sortearNumeros() {
            const { data } = await sbClient.from('salas').select('*').eq('id_sala', salaAtual).single();
            if (!data) return;
            let n = shuffleArray(Array.from({length: 100}, (_, i) => i + 1));
            let novosJogadores = data.jogadores.map((j, i) => ({ id: j.id, nome: j.nome, numero: n[i] }));
            await sbClient.from('salas').update({ jogadores: novosJogadores, status: 'sorteado' }).eq('id_sala', salaAtual);
        }

        async function revelarTodos() {
            await sbClient.from('salas').update({ status: 'revelado' }).eq('id_sala', salaAtual);
        }

        async function voltarLobby() {
            const { data } = await sbClient.from('salas').select('*').eq('id_sala', salaAtual).single();
            let listaReset = data.jogadores.map(j => ({ id: j.id, nome: j.nome, numero: null }));
            await sbClient.from('salas').update({ status: 'esperando', jogadores: listaReset }).eq('id_sala', salaAtual);
        }

        async function kick(id) {
            const { data } = await sbClient.from('salas').select('*').eq('id_sala', salaAtual).single();
            let novaLista = data.jogadores.filter(j => j.id !== id);
            await sbClient.from('salas').update({ jogadores: novaLista }).eq('id_sala', salaAtual);
        }

        function copiarLink() {
            const urlSala = window.location.origin + window.location.pathname + "?sala=" + salaAtual;
            navigator.clipboard.writeText(urlSala);
            alert("Link copiado!");
        }

        function inscreverNoJogo() {
            sbClient.channel('ito_' + salaAtual)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'salas', filter: `id_sala=eq.${salaAtual}` }, payload => {
                atualizarInterface(payload.new);
            }).subscribe();
            
            sbClient.from('salas').select('*').eq('id_sala', salaAtual).single().then(({data}) => { if(data) atualizarInterface(data); });
        }

        function atualizarInterface(d) {
            if (!d || !d.jogadores) return;
            if (!d.jogadores.find(j => j.id === meuID)) { 
                localStorage.removeItem(`host_${salaAtual}`);
                window.location.href = window.location.origin + window.location.pathname; return; 
            }

            globalStatus = d.status;

            const listaUl = document.getElementById('lista-jogadores');
            listaUl.innerHTML = "";
            d.jogadores.forEach((j, index) => {
                const li = document.createElement('li');
                li.className = 'jogador-item';
                const nomeDisplay = j.nome || `JOGADOR ${index + 1}`;
                li.innerHTML = `<span>${nomeDisplay} <span style="opacity:0.5; font-size:0.8rem;">${j.id === meuID ? '(VOCÊ)' : ''}</span></span>`;
                
                if (souHost && j.id !== meuID) {
                    const btn = document.createElement('button');
                    btn.innerText = "Remover"; btn.className = "btn-kick";
                    btn.onclick = () => kick(j.id);
                    li.appendChild(btn);
                }
                listaUl.appendChild(li);
            });

            const eu = d.jogadores.find(j => j.id === meuID);
            document.getElementById('meu-numero').innerText = eu.numero || "?";

            if (globalStatus === 'esperando') {
                document.getElementById('lobby-area').style.display = 'flex';
                document.getElementById('game-section').style.display = 'none';
                
                if(souHost) {
                    document.getElementById('lobby-host-controls').style.display = 'block';
                    document.getElementById('wait-message-lobby').style.display = 'none';
                } else {
                    document.getElementById('lobby-host-controls').style.display = 'none';
                    document.getElementById('wait-message-lobby').style.display = 'block';
                }
            } else {
                document.getElementById('lobby-area').style.display = 'none';
                document.getElementById('game-section').style.display = 'block';
                
                if (souHost) {
                    document.getElementById('host-controls').style.display = 'block';
                    document.getElementById('btn-revelar').style.display = globalStatus === 'sorteado' ? 'block' : 'none';
                    document.getElementById('btn-reset').style.display = globalStatus === 'revelado' ? 'block' : 'none';
                }

                if (globalStatus === 'revelado') {
                    document.getElementById('interrogacao').style.display = 'none';
                    document.getElementById('meu-numero').style.display = 'block';
                    document.getElementById('instrucao-texto').innerText = "REVELADO!";
                    document.getElementById('card-principal').classList.add('active');
                } else {
                    document.getElementById('interrogacao').style.display = 'block';
                    document.getElementById('meu-numero').style.display = 'none';
                    document.getElementById('instrucao-texto').innerText = "Segure para revelar";
                    document.getElementById('card-principal').classList.remove('active');
                }
            }
        }

        window.onload = () => {
            const s = new URLSearchParams(window.location.search).get('sala');
            if(s) { document.getElementById('input-sala').value = s; entrarSala(); }
        };
    </script>
</body>
</html>
