<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITO Digital - V1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; margin: 0; }
        h1 { color: #6200ee; margin-bottom: 30px; }
        .card { background: #1e1e1e; border: 2px solid #333; border-radius: 20px; padding: 40px; margin: 20px auto; max-width: 280px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .hidden-number { font-size: 5rem; font-weight: bold; filter: blur(25px); transition: filter 0.3s ease; cursor: pointer; user-select: none; -webkit-touch-callout: none; }
        .hidden-number:active { filter: blur(0); }
        .revealed { filter: blur(0) !important; color: #00ff88; transition: 0.5s; }
        button { background: #6200ee; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #3700b3; }
        .btn-revelar { background: #cf6679; margin-top: 40px; }
        #qrcode { background: white; padding: 15px; display: inline-block; margin: 20px auto; border-radius: 10px; }
        input { padding: 15px; width: 85%; border-radius: 12px; border: 2px solid #333; background: #1e1e1e; color: white; margin-bottom: 15px; text-align: center; font-size: 1.2rem; }
        #wait-message { margin-top: 20px; color: #888; font-style: italic; }
        .status-badge { background: #333; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>ITO Digital</h1>
    
    <div id="setup-section">
        <button onclick="criarSala()">CRIAR NOVA SALA (HOST)</button>
        <div style="margin: 20px 0; color: #555;">OU</div>
        <input type="text" id="input-sala" placeholder="CÓDIGO DA SALA">
        <button onclick="entrarSala()">ENTRAR NA SALA</button>
    </div>
