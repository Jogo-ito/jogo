<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITO Digital - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; margin: 0; }
        .card { background: #1e1e1e; border: 2px solid #333; border-radius: 20px; padding: 30px; margin: 20px auto; max-width: 280px; }
        .hidden-number { font-size: 5rem; font-weight: bold; filter: blur(25px); transition: 0.3s; cursor: pointer; user-select: none; }
        .hidden-number:active { filter: blur(0); }
        .revealed { filter: blur(0) !important; color: #00ff88; }
        button { background: #6200ee; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; margin: 8px 0; }
        .btn-revelar { background: #cf6679; }
        .btn-reset { background: #03dac6; color: black; }
        .btn-kick { background: #ff4444; padding: 5px 10px; width: auto; font-size: 0.7rem; margin-left: 10px; border-radius: 5px; }
        #lista-jogadores { list-style: none; padding: 0; text-align: left; max-width: 250px; margin: 20px auto; }
        .jogador-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #333; }
        #qrcode { background: white; padding: 10px; display: inline-block; margin: 15px; border-radius: 10px; }
        input { padding: 15px; width: 80%; border-radius: 12px; border: 2px solid #333; background: #1e1e1e; color: white; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <h1>ITO Digital</h1>
    
    <div id="setup-section">
        <button onclick="criarSala()">CRIAR NOVA SALA (HOST)</button>
        <div style="margin: 15px 0; color: #555;">OU</div>
        <input type="text" id="input-sala" placeholder="CÓDIGO DA SALA">
        <button onclick="entrarSala()">ENTRAR NA SALA</button>
    </div>

    <div id="game-section" style="display:none;">
        <p>SALA: <strong id="display-id-sala"></strong></p>
        
        <div id="lobby-area">
            <div id="qrcode-container" style="display:none;">
                <div id="qrcode"></div>
                <p style="font-size: 0.8rem; color: #888;">Amigos escaneiam para entrar</p>
            </div>
            <h3>Jogadores:</h3>
            <ul id="lista-jogadores"></ul>
        </div>

        <div class="card" id="card-principal" style="display:none;">
            <p style="color: #888; margin: 0;">Seu número:</p>
            <div id="meu-numero" class="hidden-number">?</div>
        </div>
        
        <div id="host-controls" style="display:none;">
            <button id="btn-sortear" onclick="sortearNumeros()">SORTEAR E COMEÇAR</button>
            <button class="btn-revelar" id="btn-revelar" style="display:none;" onclick="revelarTodos()">REVELAR TUDO</button>
            <button class="btn-reset" id="btn-reset" style="display:none;" onclick="voltarLobby()">PRÓXIMA RODADA</button>
        </div>
        
        <div id="wait-message" style="margin-top:20px; color: orange;">Aguardando Host...</div>
    </div>
